<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F172A"/>
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="238" fill="none" stroke="#1E293B" stroke-width="4"/>

  <!-- Lightning bolt - the "blitz" -->
  <path d="M 296 72 L 186 232 L 248 232 L 216 440 L 326 264 L 264 264 L 296 72 Z"
        fill="url(#bolt)" stroke="#E0E7FF" stroke-width="3" stroke-linejoin="round"/>

  <!-- Binary bits floating around the bolt -->
  <text x="130" y="160" font-family="monospace" font-size="28" fill="#475569" font-weight="bold">0</text>
  <text x="362" y="180" font-family="monospace" font-size="28" fill="#475569" font-weight="bold">1</text>
  <text x="112" y="300" font-family="monospace" font-size="28" fill="#475569" font-weight="bold">1</text>
  <text x="380" y="340" font-family="monospace" font-size="28" fill="#475569" font-weight="bold">0</text>
  <text x="148" y="400" font-family="monospace" font-size="22" fill="#334155" font-weight="bold">1</text>
  <text x="350" y="120" font-family="monospace" font-size="22" fill="#334155" font-weight="bold">0</text>

  <!-- Register names as subtle decoration -->
  <text x="96" y="228" font-family="monospace" font-size="16" fill="#334155">rax</text>
  <text x="378" y="260" font-family="monospace" font-size="16" fill="#334155">rcx</text>
</svg>
