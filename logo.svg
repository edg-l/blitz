<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="boltshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23  0 0 0 0 0.51  0 0 0 0 0.96  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="#0B1120"/>
  <circle cx="256" cy="256" r="248" fill="url(#glow)"/>

  <!-- Lightning bolt - sharp, angular, aggressive -->
  <path d="M 310 48 L 178 228 L 236 228 L 158 464 L 340 252 L 276 252 Z"
        fill="url(#bolt)" filter="url(#boltshadow)"/>

  <!-- Smaller secondary bolt shard - left -->
  <path d="M 168 140 L 122 220 L 148 220 L 118 308 L 192 232 L 162 232 Z"
        fill="#3B82F6" opacity="0.35"/>

  <!-- Smaller secondary bolt shard - right -->
  <path d="M 358 200 L 384 268 L 364 268 L 394 372 L 338 280 L 360 280 Z"
        fill="#7C3AED" opacity="0.3"/>

  <!-- Binary bits -->
  <text x="108" y="168" font-family="monospace" font-size="24" fill="#475569" font-weight="bold">0</text>
  <text x="384" y="172" font-family="monospace" font-size="24" fill="#475569" font-weight="bold">1</text>
  <text x="88" y="320" font-family="monospace" font-size="24" fill="#475569" font-weight="bold">1</text>
  <text x="400" y="350" font-family="monospace" font-size="24" fill="#475569" font-weight="bold">0</text>
  <text x="134" y="420" font-family="monospace" font-size="18" fill="#334155" font-weight="bold">1</text>
  <text x="370" y="126" font-family="monospace" font-size="18" fill="#334155" font-weight="bold">0</text>

  <!-- Register names -->
  <text x="72" y="244" font-family="monospace" font-size="14" fill="#334155">rax</text>
  <text x="406" y="270" font-family="monospace" font-size="14" fill="#334155">rcx</text>
</svg>
